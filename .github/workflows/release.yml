name: "Release"

on:
  push:
    # 只有推送形如 v1.0.0 这样的 tag 时才会触发工作流
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write # 必须要有写入权限才能创建 Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            target: "aarch64-apple-darwin" # 苹果 M 系列芯片
          - platform: "macos-latest"
            target: "x86_64-apple-darwin" # 苹果 Intel 芯片
          - platform: "ubuntu-22.04"
            target: "x86_64-unknown-linux-gnu" # Linux x64
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc" # Windows x64 (64位)
          - platform: "windows-latest"
            target: "i686-pc-windows-msvc" # Windows x86 (32位)

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # 安装当前矩阵对应的目标架构支持
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: "ExcelToCSV v__VERSION__"
          releaseBody: "自动构建发布的版本，请在下方 Assets 下载对应平台的可执行文件。"
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
