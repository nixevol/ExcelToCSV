name: "Release"

on:
  push:
    # 只有推送形如 v1.0.0 这样的 tag 时才会触发工作流
    tags:
      - "v*"
  workflow_dispatch: # 允许在 GitHub 网页端手动点击按钮触发

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- macOS ---
          - platform: "macos-latest"
            target: "aarch64-apple-darwin" # 苹果 M 系列芯片 (ARM)
          - platform: "macos-latest"
            target: "x86_64-apple-darwin" # 苹果 Intel 芯片

          # --- Windows ---
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc" # Windows 64位 (主流)
          - platform: "windows-latest"
            target: "i686-pc-windows-msvc" # Windows 32位 (老旧电脑)
          - platform: "windows-latest"
            target: "aarch64-pc-windows-msvc" # Windows ARM64 (Surface Pro X, 骁龙本等)

          # --- Linux ---
          # 默认打包会生成 AppImage 和 deb，AppImage 可以在 CentOS、Fedora、Arch 等大多数发行版上双击运行
          - platform: "ubuntu-22.04"
            target: "x86_64-unknown-linux-gnu" # Linux x64 (主流桌面)
          
          # 注意：如果你的仓库是私有仓库且没有购买 GitHub 的 ARM 运行器时长，这一步可能会一直排队或失败。
          # 公开仓库目前已经可以免费使用 ubuntu-24.04-arm 运行器。
          - platform: "ubuntu-24.04-arm"
            target: "aarch64-unknown-linux-gnu" # Linux ARM64 (树莓派、飞腾、鲲鹏等架构机型)

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu only)
        # 只要是 Ubuntu 系统，不管 x64 还是 arm64 都可以用 apt 安装依赖
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: "ExcelToCSV v__VERSION__"
          releaseBody: "自动构建发布的版本，请在下方 Assets 下载对应平台的可执行文件。"
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
